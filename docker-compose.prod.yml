# Frontend (Next.js) — VPS: dari GitHub cukup pull lalu run compose (tanpa npm di host)
#
# VPS (sekali jalan, opsional): cp .env.prod.example .env && nano .env
# Lalu: docker compose -f docker-compose.prod.yml up -d --build
#
# Domain: zacloth.com → nginx → fe:3000

services:
  fe:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://lostmedia.zacloth.com}
        NEXTAUTH_URL: ${NEXTAUTH_URL:-https://zacloth.com}
    container_name: lost_fe
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://zacloth.com}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-in-production}
    restart: unless-stopped
